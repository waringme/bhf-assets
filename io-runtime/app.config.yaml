application:
  runtimeManifest:
    packages:
      sage-portal:
        license: Apache-2.0
        actions:
          get-token:
            function: actions/get-token.js
            web: true
            runtime: nodejs:18
            inputs:
              LOG_LEVEL: info
              # These will be set via .env file or aio CLI
              IMS_CLIENT_ID: $IMS_CLIENT_ID
              IMS_CLIENT_SECRET: $IMS_CLIENT_SECRET
              IMS_SCOPES: $IMS_SCOPES
            annotations:
              require-adobe-auth: false
              final: true
